# Cargo configuration for cityjson-rs

[package]
exclude = ["tools", "bench_results", "profiling", "docker", "tests/data"]

# Custom cargo aliases for benchmarking and profiling
[alias]
# Benchmark aliases
bench-all = "bench --workspace --all-features"
bench-builder = "bench --bench builder --all-features"
bench-processor = "bench --bench processor --all-features"
bench-memory = "bench --bench memory --all-features"

# Build aliases
build-prof = "build --release --profile bench"
test-prof = "test --release --profile bench"

# Combined commands
perf-check = "bench --workspace --no-fail-fast --all-features"
full-bench = "bench --workspace --verbose --all-features"

# Example usage:
# cargo bench-all
# cargo bench-parsing
# cargo perf-check
