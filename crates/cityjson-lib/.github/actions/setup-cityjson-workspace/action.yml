name: Set up CityJSON workspace
description: Check out cityjson-lib with sibling path dependencies and install shared CI tooling.

inputs:
  toolchain:
    description: Rust toolchain to install.
    default: stable
  components:
    description: Comma-separated Rust components to install.
    default: ""
  setup-uv:
    description: Install uv for Python and docs jobs.
    default: "false"
  checkout-fake:
    description: Check out the cityjson-fake fixture repository.
    default: "false"

runs:
  using: composite
  steps:
    - uses: actions/checkout@v6
      with:
        path: cityjson-lib

    - uses: actions/checkout@v6
      with:
        repository: 3DGI/cityjson-rs
        path: cityjson-rs

    - uses: actions/checkout@v6
      with:
        repository: 3DGI/cityjson-json
        path: cityjson-json

    - uses: actions/checkout@v6
      with:
        repository: 3DGI/cityjson-arrow
        path: cityjson-arrow

    - uses: actions/checkout@v6
      with:
        repository: 3DGI/cityjson-parquet
        path: cityjson-parquet

    - if: ${{ inputs.checkout-fake == 'true' }}
      uses: actions/checkout@v6
      with:
        repository: 3DGI/cityjson-fake
        path: cityjson-fake

    - if: ${{ inputs.components == '' }}
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ inputs.toolchain }}

    - if: ${{ inputs.components != '' }}
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ inputs.toolchain }}
        components: ${{ inputs.components }}

    - uses: extractions/setup-just@v4

    - if: ${{ inputs.setup-uv == 'true' }}
      uses: astral-sh/setup-uv@v6
