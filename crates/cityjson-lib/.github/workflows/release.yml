name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

defaults:
  run:
    working-directory: .

jobs:
  release:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout sibling repositories
        run: |
          git clone --depth=1 --branch master https://github.com/3DGI/cityjson-rs.git ../cityjson-rs
          git clone --depth=1 --branch master https://github.com/3DGI/cityjson-json.git ../cityjson-json

      - name: Verify tag is on master
        run: |
          git fetch origin master --depth=1
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/master; then
            echo "::error::Tag ${GITHUB_REF_NAME} is not reachable from master."
            exit 1
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.0

      - name: Install Python tooling
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Install cbindgen
        run: cargo install cbindgen --version 0.29.2 --locked

      - name: Build FFI C++ artifacts
        run: |
          ./tools/ffi.sh build header
          ./tools/ffi.sh build cpp

      - name: Test Rust workspace
        run: cargo test --workspace --all-targets --all-features

      - name: Build Python artifacts
        run: uv build ffi/python/ --wheel --sdist --out-dir ffi/python/dist

      - name: Verify Python wheel installs in a clean environment
        run: |
          python -m venv /tmp/cityjson-lib-wheel
          /tmp/cityjson-lib-wheel/bin/pip install --upgrade pip
          /tmp/cityjson-lib-wheel/bin/pip install ffi/python/dist/*.whl
          /tmp/cityjson-lib-wheel/bin/python -c "import cityjson_lib"

      - name: Run Python smoke tests
        run: cd ffi/python && uv run tox run

      - name: Run FFI checks
        run: ./tools/ffi.sh test

      - name: Publish Rust crate
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --locked --package cityjson-lib

      - name: Publish FFI core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          for attempt in 1 2 3 4 5; do
            if cargo publish --locked --package cityjson-lib-ffi-core; then
              exit 0
            fi
            sleep 20
          done
          cargo publish --locked --package cityjson-lib-ffi-core

      - name: Publish Python package
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: ffi/python/dist

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --target "$GITHUB_SHA" --title "$GITHUB_REF_NAME" --generate-notes
