name: Rust test

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

# Sibling checkout layout under $GITHUB_WORKSPACE:
#   cityjson-lib/      ← this repo
#   cityjson-rs/       ← path dep ../cityjson-rs
#   cityjson-json/     ← path dep ../cityjson-json
#   cityjson-arrow/    ← path dep ../cityjson-arrow  (optional feature)
#   cityjson-parquet/  ← path dep ../cityjson-parquet (optional feature)

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cityjson-lib
    steps:
    - uses: actions/checkout@v3
      with:
        path: cityjson-lib
    - uses: actions/checkout@v3
      with:
        repository: 3DGI/cityjson-rs
        path: cityjson-rs
    - uses: actions/checkout@v3
      with:
        repository: balazsdukai/cityjson-json
        path: cityjson-json
    - uses: actions/checkout@v3
      with:
        repository: 3DGI/cityjson-arrow
        path: cityjson-arrow
    - uses: actions/checkout@v3
      with:
        repository: 3DGI/cityjson-parquet
        path: cityjson-parquet
    - name: Build
      run: cargo build --verbose
    - name: Run tests
      run: cargo test --verbose
  test_python:
    runs-on: ubuntu-latest
    steps:
      - name: pytest cjlib_py
        id: get_status
        uses: stinkyfingers/cross-repo-dispatch@v0.1
        with:
          owner: 'balazsdukai'
          repo: 'cjlib_py'
          ref: 'master'
          pat: ${{ secrets.GH_PAT }}
          user: ${{ secrets.GH_USERNAME }}
          sha: ${{ github.sha }}
          client_payload: '{"misc_key":"misc_value"}'
          event_type: ${{ github.event.head_commit.message }}
          workflow_status_timeout: 600
          workflow_status_retry_interval: 20
      - name: cjlib_py result
        run: |
          echo ${{join(steps.get_status.outputs.*, '\n')}}
      - if: ${{ steps.get_status.outputs.status }} != 'success'
        uses: actions/github-script@v3
        with:
          script: |
            core.setFailed('the cjlib_py workflow failed with the latest cjlib')
