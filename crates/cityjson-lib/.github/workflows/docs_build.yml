name: Docs build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

# Sibling checkout layout under $GITHUB_WORKSPACE:
#   cityjson-lib/      ← this repo
#   cityjson-rs/       ← path dep ../cityjson-rs
#   cityjson-json/     ← path dep ../cityjson-json
#   cityjson-arrow/    ← path dep ../cityjson-arrow  (optional feature)
#   cityjson-parquet/  ← path dep ../cityjson-parquet (optional feature)

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cityjson-lib
    steps:
    - uses: actions/checkout@v3
      with:
        path: cityjson-lib
    - uses: actions/checkout@v3
      with:
        repository: 3DGI/cityjson-rs
        path: cityjson-rs
    - uses: actions/checkout@v3
      with:
        repository: balazsdukai/cityjson-json
        path: cityjson-json
    - uses: actions/checkout@v3
      with:
        repository: 3DGI/cityjson-arrow
        path: cityjson-arrow
    - uses: actions/checkout@v3
      with:
        repository: 3DGI/cityjson-parquet
        path: cityjson-parquet
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f python-requirements-dev.txt ]; then pip install -r python-requirements-dev.txt; fi
    - name: Build mkdocs
      run: mkdocs build
    - name: Build rustdoc
      run: cargo doc --document-private-items --no-deps
