name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  RUSTFLAGS: -Dwarnings

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: cityjson-lib
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-cityjson-workspace
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: cityjson-lib
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-cityjson-workspace
        with:
          components: clippy
      - run: just lint

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}-latest
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu, macos, windows]
    timeout-minutes: 45
    defaults:
      run:
        working-directory: cityjson-lib
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-cityjson-workspace
        with:
          checkout-fake: "true"
      - run: just test

  build:
    name: Build (MSRV ${{ matrix.rust }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rust: [1.93.0]
    timeout-minutes: 45
    defaults:
      run:
        working-directory: cityjson-lib
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-cityjson-workspace
        with:
          toolchain: ${{ matrix.rust }}
      - run: just build

  nightly:
    name: Build (nightly)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: cityjson-lib
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-cityjson-workspace
        with:
          toolchain: nightly
      - run: just build

  doc:
    name: Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      RUSTDOCFLAGS: --cfg docsrs -Dwarnings
    defaults:
      run:
        working-directory: cityjson-lib
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-cityjson-workspace
        with:
          toolchain: nightly
          setup-uv: "true"
      - run: cargo doc --all-features --no-deps -p cityjson-lib
      - run: just docs-build

  test-python:
    name: Python bindings (${{ matrix.os }})
    runs-on: ${{ matrix.os }}-latest
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu, macos, windows]
    timeout-minutes: 30
    defaults:
      run:
        working-directory: cityjson-lib
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-cityjson-workspace
        with:
          setup-uv: "true"
      - run: just test-python

  ffi:
    name: FFI
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: cityjson-lib
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-cityjson-workspace
      - run: cargo install cbindgen --version 0.29.2 --locked
      - run: just ffi test
