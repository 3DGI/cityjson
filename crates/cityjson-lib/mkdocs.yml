site_name: cjlib
site_description: User-facing facade docs for the CityJSON crate ecosystem
docs_dir: docs
strict: true
nav:
  - Overview:
      - Home: index.md
      - Guide: guide.md
      - Examples: examples.md
      - FAQ: faq.md
  - API Design:
      - Public API: public-api.md
      - Model Boundary: model-api.md
      - JSON Boundary: json-api.md
  - FFI & Bindings:
      - Overview: ffi/index.md
      - Conventions: ffi/conventions.md
  - Integration:
      - serde_cityjson Integration Plan: serde-cityjson-integration-plan.md
      - Template and Instance Note: template-instance-import-note.md
  - Engineering:
      - Engineering choices: engineering.md
      - Refactor plan: refactor-plan.md
theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
plugins:
  - search
markdown_extensions:
  # admonitions
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  # content tabs
  - pymdownx.tabbed:
      alternate_style: true
  # tasklists
  - pymdownx.tasklist:
      custom_checkbox: true
  # emojis
  - attr_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  # footnotes
  - footnotes
