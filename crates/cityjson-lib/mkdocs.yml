site_name: cjlib
site_description: User-facing facade docs for the CityJSON crate ecosystem
docs_dir: docs
strict: true
nav:
  - Overview:
      - Home: index.md
      - CityJSON Ecosystem Naming Map: ecosystem-naming.md
      - Architecture: architecture.md
      - Shared Corpus Migration Plan: shared-corpus-migration-plan.md
      - Guide: guide.md
      - Reading Data: guide-reading.md
      - Writing Data: guide-writing.md
      - Examples: examples.md
  - API Design:
      - Public API: public-api.md
      - Model Boundary: model-api.md
      - JSON Boundary: json-api.md
      - Format Modules: format-api.md
      - Operations: operations-api.md
  - FFI & Bindings:
      - Overview: ffi/index.md
      - Shared Low-level Core: ffi/shared-core.md
      - FFI Implementation Plan: ffi/ffi-implementation-plan.md
      - Conventions: ffi/conventions.md
  - Architecture Decisions:
      - Shared C ABI Foundation: adr/0001-shared-c-abi-foundation.md
      - FFI Header Workflow: adr/0002-ffi-header-workflow.md
      - FFI Inspection And Coordinate Buffers: adr/0003-shared-ffi-inspection-and-coordinate-buffers.md
      - Wrapper Milestone One Shape: adr/0004-wrapper-milestone-one-shape.md
      - Columnar Geometry Boundary ABI: adr/0005-columnar-geometry-boundary-abi.md
      - Model-Authoritative JSON Workflows: adr/0006-model-authoritative-json-ffi-workflows.md
      - JSON Write Options And Feature Streams: adr/0007-json-write-options-and-feature-stream-bytes.md
      - Wasm32 Portability Note And Wasm64 Path: adr/0008-wasm32-blocker-and-wasm64-path.md
      - CityJSON Benchmark Corpus Design: adr/0009-cityjson-benchmark-corpus-design.md
theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
plugins:
  - search
markdown_extensions:
  # admonitions
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  # content tabs
  - pymdownx.tabbed:
      alternate_style: true
  # tasklists
  - pymdownx.tasklist:
      custom_checkbox: true
  # emojis
  - attr_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  # footnotes
  - footnotes
