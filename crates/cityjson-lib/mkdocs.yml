site_name: cjlib
site_description: User-facing facade docs for the CityJSON crate ecosystem
docs_dir: docs
strict: true
nav:
  - Overview:
      - Home: index.md
      - Architecture: architecture.md
      - Guide: guide.md
      - Examples: examples.md
  - API Design:
      - Public API: public-api.md
      - Model Boundary: model-api.md
      - JSON Boundary: json-api.md
      - Format Modules: format-api.md
      - Operations: operations-api.md
  - FFI & Bindings:
      - Overview: ffi/index.md
      - Shared Low-level Core: ffi/shared-core.md
      - Conventions: ffi/conventions.md
      - C++ Plan: ffi/cpp-ffi-plan.md
      - Python Plan: ffi/python-ffi-plan.md
      - Wasm Plan: ffi/wasm-ffi-plan.md
theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
plugins:
  - search
markdown_extensions:
  # admonitions
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  # content tabs
  - pymdownx.tabbed:
      alternate_style: true
  # tasklists
  - pymdownx.tasklist:
      custom_checkbox: true
  # emojis
  - attr_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  # footnotes
  - footnotes
