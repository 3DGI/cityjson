site_name: cjlib
nav:
  - Home: index.md
  - Reference: api.md
theme:
  name: material
  features:
    - navigation.tabs
markdown_extensions:
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
