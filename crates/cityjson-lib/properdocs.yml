site_name: cityjson_lib
site_description: Minimal release-facing docs for cityjson_lib
docs_dir: docs
strict: true
nav:
  - Overview:
      - Home: index.md
      - Guide: guide.md
      - Reading Data: guide-reading.md
      - Writing Data: guide-writing.md
      - Release Checklist: release-checklist.md
  - Rust API:
      - Public API: public-api.md
      - JSON Boundary: json-api.md
      - Operations: operations-api.md
  - FFI & Bindings:
      - Overview: ffi/index.md
      - Binding API: ffi/api.md
theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
plugins:
  - search
markdown_extensions:
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - attr_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - footnotes
