[package]
name = "cjlib"
version = "0.1.0"
edition = "2024"
rust-version = "1.93"
include = ["/resources"]
exclude = ["/tests/output"]

[workspace]
members = [
    ".",
    "ffi/core",
    "ffi/wasm",
]
resolver = "2"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[lib]
name = "cjlib"
path = "src/lib.rs"

[dependencies]
cityjson = { path = "../cityjson-rs" }
cityarrow = { path = "../cityarrow" }
cityparquet = { path = "../cityarrow/cityparquet" }
serde_cityjson = { path = "../serde_cityjson" }
serde = { version = "1.0", features = ["derive"] }
serde_json = { version = "1.0", features = ["raw_value"] }

[dev-dependencies]
