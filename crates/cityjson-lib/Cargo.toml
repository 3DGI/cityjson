[package]
name = "cjlib"
version = "0.1.0"
edition = "2021"
rust-version = "1.65"
include = ["/resources"]
exclude = ["/tests/output/*.json"]

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[lib]
name="cjlib"
path= "src/lib.rs"