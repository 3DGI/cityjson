[package]
name = "cityjson-lib"
version = "0.3.0"
edition = "2024"
rust-version = "1.93"
description = "High-level CityJSON 2.0 read/write facade integrating JSON, Arrow, and Parquet I/O"
license = "MIT OR Apache-2.0"
repository = "https://github.com/3DGI/cityjson-lib"
keywords = ["cityjson", "geospatial", "3d", "gis", "arrow"]
categories = ["encoding", "science::geo"]
readme = "README.md"
include = ["/src", "/resources", "/Cargo.toml", "/README.md", "/LICENSE-MIT", "/LICENSE-Apache-2.0"]
exclude = ["/tests/output"]

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[features]
default = ["arrow", "parquet"]
arrow = ["dep:cityjson-arrow"]
parquet = ["arrow", "dep:cityjson-parquet"]

[workspace]
members = [
    ".",
    "ffi/core",
    "ffi/wasm",
]
resolver = "2"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[lib]
name = "cityjson_lib"
path = "src/lib.rs"

[dependencies]
cityjson = { path = "../cityjson-rs", version = "0.6.1" }
cityjson-arrow = { path = "../cityjson-arrow", version = "0.5.2", optional = true }
cityjson-parquet = { path = "../cityjson-parquet", version = "0.5.2", optional = true }
cityjson-json = { path = "../cityjson-json", version = "0.6.1" }
serde = { version = "1.0", features = ["derive"] }
serde_json = { version = "1.0", features = ["raw_value"] }

[dev-dependencies]
criterion = "0.7"
dhat = "0.3"
tempfile = "3.23"

[[bench]]
name = "throughput"
harness = false
required-features = ["arrow", "parquet"]

[[bench]]
name = "diagnostic"
harness = false
required-features = ["arrow", "parquet"]

[[bench]]
name = "profile"
harness = false
required-features = ["arrow", "parquet"]
