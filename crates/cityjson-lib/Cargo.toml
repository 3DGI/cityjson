[package]
name = "cityjson-lib"
version = "0.3.0"
edition = "2024"
rust-version = "1.93"
include = ["/resources"]
exclude = ["/tests/output"]

[features]
default = ["arrow", "parquet"]
arrow = ["dep:cityjson-arrow"]
parquet = ["arrow", "dep:cityjson-parquet"]

[workspace]
members = [
    ".",
    "ffi/core",
    "ffi/wasm",
]
resolver = "2"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[lib]
name = "cityjson_lib"
path = "src/lib.rs"

[dependencies]
cityjson = { path = "../cityjson-rs" }
cityjson-arrow = { path = "../cityjson-arrow", optional = true }
cityjson-parquet = { path = "../cityjson-arrow/cityjson-parquet", optional = true }
cityjson-json = { path = "../cityjson-json" }
serde = { version = "1.0", features = ["derive"] }
serde_json = { version = "1.0", features = ["raw_value"] }

[dev-dependencies]
criterion = "0.7"
dhat = "0.3"
tempfile = "3.23"

[[bin]]
name = "bench_export_formats"
path = "src/bin/bench_export_formats.rs"
required-features = ["arrow", "parquet"]

[[bin]]
name = "bench_validate_formats"
path = "src/bin/bench_validate_formats.rs"
required-features = ["arrow", "parquet"]

[[bench]]
name = "throughput"
harness = false
required-features = ["arrow", "parquet"]

[[bench]]
name = "diagnostic"
harness = false
required-features = ["arrow", "parquet"]

[[bench]]
name = "profile"
harness = false
required-features = ["arrow", "parquet"]
