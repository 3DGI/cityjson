name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  RUSTFLAGS: -Dwarnings
  CITYJSON_PARQUET_SHARED_CORPUS_ROOT: ${{ github.workspace }}/cityjson-corpus

# Sibling checkout layout under $GITHUB_WORKSPACE:
#   cityjson-parquet/  ← this repo
#   cityjson-rs/       ← path dep ../cityjson-rs
#   cityjson-json/     ← path dep ../cityjson-json (dev-dep)
#   cityjson-arrow/    ← path dep ../cityjson-arrow

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: cityjson-parquet
    steps:
      - uses: actions/checkout@v6
        with:
          path: cityjson-parquet
      - uses: actions/checkout@v6
        with:
          repository: 3DGI/cityjson-rs
          path: cityjson-rs
      - uses: actions/checkout@v6
        with:
          repository: 3DGI/cityjson-json
          path: cityjson-json
      - uses: actions/checkout@v6
        with:
          repository: 3DGI/cityjson-arrow
          path: cityjson-arrow
          token: ${{ secrets.GH_PAT }}
          sparse-checkout: |
            Cargo.toml
            src
            tests/support
          sparse-checkout-cone-mode: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: extractions/setup-just@v4
      - run: cargo fmt --all -- --check

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: cityjson-parquet
    steps:
      - uses: actions/checkout@v6
        with:
          path: cityjson-parquet
      - uses: actions/checkout@v6
        with:
          repository: 3DGI/cityjson-rs
          path: cityjson-rs
      - uses: actions/checkout@v6
        with:
          repository: 3DGI/cityjson-json
          path: cityjson-json
      - uses: actions/checkout@v6
        with:
          repository: 3DGI/cityjson-arrow
          path: cityjson-arrow
          token: ${{ secrets.GH_PAT }}
          sparse-checkout: |
            Cargo.toml
            src
            tests/support
          sparse-checkout-cone-mode: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: extractions/setup-just@v4
      - run: just lint

  test:
    name: Test (${{matrix.os}})
    runs-on: ${{matrix.os}}-latest
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu, macos, windows]
    timeout-minutes: 45
    defaults:
      run:
        working-directory: cityjson-parquet
    steps:
      - uses: actions/checkout@v6
        with:
          path: cityjson-parquet
      - uses: actions/checkout@v6
        with:
          repository: 3DGI/cityjson-rs
          path: cityjson-rs
      - uses: actions/checkout@v6
        with:
          repository: 3DGI/cityjson-json
          path: cityjson-json
      - uses: actions/checkout@v6
        with:
          repository: 3DGI/cityjson-arrow
          path: cityjson-arrow
          token: ${{ secrets.GH_PAT }}
      - uses: actions/checkout@v6
        with:
          repository: 3DGI/cityjson-fake
          path: cityjson-fake
      - uses: actions/checkout@v6
        with:
          repository: 3DGI/cityjson-corpus
          path: cityjson-corpus
          sparse-checkout: |
            artifacts
            cases
          sparse-checkout-cone-mode: true
      - run: python scripts/render_correctness_index.py
        working-directory: cityjson-corpus
      - uses: dtolnay/rust-toolchain@stable
      - uses: extractions/setup-just@v4
      - run: just test

  build:
    name: Build (MSRV ${{matrix.rust}})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rust: [ 1.93.0 ]
    timeout-minutes: 45
    defaults:
      run:
        working-directory: cityjson-parquet
    steps:
      - uses: actions/checkout@v6
        with:
          path: cityjson-parquet
      - uses: actions/checkout@v6
        with:
          repository: 3DGI/cityjson-rs
          path: cityjson-rs
      - uses: actions/checkout@v6
        with:
          repository: 3DGI/cityjson-json
          path: cityjson-json
      - uses: actions/checkout@v6
        with:
          repository: 3DGI/cityjson-arrow
          path: cityjson-arrow
          token: ${{ secrets.GH_PAT }}
          sparse-checkout: |
            Cargo.toml
            src
            tests/support
          sparse-checkout-cone-mode: false
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{matrix.rust}}
      - uses: extractions/setup-just@v4
      - run: just build

  nightly:
    name: Build (nightly)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: cityjson-parquet
    steps:
      - uses: actions/checkout@v6
        with:
          path: cityjson-parquet
      - uses: actions/checkout@v6
        with:
          repository: 3DGI/cityjson-rs
          path: cityjson-rs
      - uses: actions/checkout@v6
        with:
          repository: 3DGI/cityjson-json
          path: cityjson-json
      - uses: actions/checkout@v6
        with:
          repository: 3DGI/cityjson-arrow
          path: cityjson-arrow
          token: ${{ secrets.GH_PAT }}
          sparse-checkout: |
            Cargo.toml
            src
            tests/support
          sparse-checkout-cone-mode: false
      - uses: dtolnay/rust-toolchain@nightly
      - uses: extractions/setup-just@v4
      - run: just build

  doc:
    name: Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      RUSTDOCFLAGS: --cfg docsrs -Dwarnings
    defaults:
      run:
        working-directory: cityjson-parquet
    steps:
      - uses: actions/checkout@v6
        with:
          path: cityjson-parquet
      - uses: actions/checkout@v6
        with:
          repository: 3DGI/cityjson-rs
          path: cityjson-rs
      - uses: actions/checkout@v6
        with:
          repository: 3DGI/cityjson-json
          path: cityjson-json
      - uses: actions/checkout@v6
        with:
          repository: 3DGI/cityjson-arrow
          path: cityjson-arrow
          token: ${{ secrets.GH_PAT }}
          sparse-checkout: |
            Cargo.toml
            src
            tests/support
          sparse-checkout-cone-mode: false
      - uses: dtolnay/rust-toolchain@nightly
      - uses: extractions/setup-just@v4
      - run: just rustdoc
