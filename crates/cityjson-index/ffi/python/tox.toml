requires = ["tox>=4", "tox-uv>=1"]
env_list = ["py311-wheel", "py311-sdist"]

[env_run_base]
description = "run the Python smoke tests against an installed package"
base_python = ["3.11"]
pass_env = ["RUSTFLAGS"]
commands = [["python", "-m", "unittest", "tests.test_api"]]

[env.py311-wheel]
package = "wheel"

[env.py311-sdist]
package = "sdist"
