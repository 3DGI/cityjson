[package]
name = "cjindex"
version = "0.1.0"
edition = "2024"
rust-version = "1.93"
description = "An indexing extension for cjlib."
license = "MIT OR Apache-2.0"
repository = "https://github.com/3DGI/cjindex"

[dependencies]
cjlib = { path = "/home/balazs/Development/cjlib" }
globset = "0.4"
ignore = "0.4"
lru = "0.12"
memmap2 = "0.9"
rusqlite = { version = "0.31", features = ["bundled"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"

