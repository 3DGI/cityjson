[package]
name = "cjindex"
version = "0.1.0"
edition = "2024"
rust-version = "1.93"
description = "An indexing extension for cjlib."
license = "MIT OR Apache-2.0"
repository = "https://github.com/3DGI/cjindex"

[dependencies]
cjlib = { path = "/home/balazs/Development/cjlib" }
clap = { version = "4.6.0", features = ["derive"] }
globset = "0.4"
ignore = "0.4"
lru = "0.12"
memmap2 = "0.9"
rusqlite = { version = "0.31", features = ["bundled"] }
serde = { version = "1", features = ["derive"] }
serde_json = { version = "1", features = ["raw_value"] }
thiserror = "2"

[dev-dependencies]
criterion = { version = "0.8.2", features = ["html_reports"] }
walkdir = "2"

[[bench]]
name = "feature_files"
harness = false

[[bench]]
name = "cityjson"
harness = false

[[bench]]
name = "ndjson"
harness = false
