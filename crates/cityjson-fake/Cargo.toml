[package]
name = "cjfake"
version = "0.3.0"
edition = "2021"
authors = ["Balázs Dukai"]
description = "Generate fake CityJSON data for testing purposes"
documentation = "https://docs.rs/cjfake"
repository = "https://github.com/balazsdukai/cjfake"
license = "Apache-2.0"
keywords = ["cityjson", "testing", "faker"]
categories = ["development-tools::testing", "simulation"]
readme = "README.md"

[[bin]]
name = "cjfake"
path = "src/main.rs"
test = false
bench = false

[lib]
name = "cjfake"
path = "src/lib.rs"

[features]
default = ["serialize"]
serialize = ["dep:cjlib", "dep:serde"]

[dependencies]
cityjson = { path = "../cityjson-rs" }
cjlib = { path = "../cjlib", optional = true }
serde = { version = "1.0", optional = true }
fake = { version = "4.4.0", features = ["uuid", "chrono"] }
jsonschema = "0.19.1"
serde_json = "1.0.145"
rand = { version = "0.9.2", features = ["small_rng"] }
clap = { version = "4.5.51", features = ["derive"] }

[dev-dependencies]
cjval = "0.8.3"
proptest = "1.9.0"
cjlib = { path = "../cjlib" }

[package.metadata.docs.rs]
rustdoc-args = ["--cfg", "docsrs"]
no-deps = true

[badges]
maintenance = { status = "actively-developed" }
