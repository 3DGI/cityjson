[package]
name = "cityjson-fake"
version = "0.3.1"
edition = "2021"
authors = ["Balázs Dukai"]
description = "Generate fake CityJSON data for testing purposes"
documentation = "https://docs.rs/cityjson-fake"
repository = "https://github.com/3DGI/cityjson-fake"
license = "Apache-2.0"
keywords = ["cityjson", "testing", "faker"]
categories = ["development-tools::testing", "simulation"]
readme = "README.md"

[[bin]]
name = "cityjson-fake"
path = "src/main.rs"
test = false
bench = false

[lib]
name = "cityjson_fake"
path = "src/lib.rs"

[features]
default = ["serialize"]
serialize = ["dep:cityjson-lib", "dep:serde"]

[dependencies]
cityjson = { path = "../cityjson-rs", version = "0.7.0" }
cityjson-lib = { path = "../cityjson-lib", version = "0.4.0", optional = true, default-features = false }
serde = { version = "1.0", optional = true }
fake = { version = "4.4.0", features = ["uuid", "chrono"] }
jsonschema = "0.19.1"
serde_json = "1.0.145"
rand = { version = "0.9.2", features = ["small_rng"] }
clap = { version = "4.5.51", features = ["derive"] }

[dev-dependencies]
cjval = "0.8.3"
proptest = "1.9.0"
cityjson-lib = { path = "../cityjson-lib" }

[package.metadata.docs.rs]
rustdoc-args = ["--cfg", "docsrs"]
no-deps = true

[badges]
maintenance = { status = "actively-developed" }
