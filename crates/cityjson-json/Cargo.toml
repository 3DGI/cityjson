[package]
name = "serde_cityjson"
version = "0.1.0"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[lib]
name = "serde_cityjson"
path = "src/lib.rs"

[features]
datasize = ["dep:datasize"]

[dependencies]
derive_more = { version = "0.99.17", features = ["display"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
datasize = { version = "0.2.15", optional = true }

[dev-dependencies]
criterion = { version = "0.4", features = ["html_reports"] }

[[bench]]
name = "serde_cityjson_benchmark"
harness = false

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]