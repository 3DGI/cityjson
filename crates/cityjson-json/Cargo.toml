[package]
name = "serde_cityjson"
version = "0.2.0"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[lib]
name = "serde_cityjson"
path = "src/lib.rs"

[[bin]]
name = "serde_cityjson"
path = "src/serde_cityjson.rs"

[[bin]]
name = "borrow_value"
path = "src/borrow_value.rs"

[features]
datasize = ["dep:datasize"]

[dependencies]
derive_more = { version = "0.99.17", features = ["display"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
datasize = { version = "0.2.15", optional = true }
serde_json_borrow = "0.3.0"

[dev-dependencies]
criterion = { version = "0.5.1", features = ["html_reports"]}

[[bench]]
name = "speed"
harness = false

[[bench]]
name = "datasize"
harness = false

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]
