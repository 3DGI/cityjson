[package]
name = "cityarrow"
version = "0.1.0"
edition = "2024"


[dependencies]
arrow = { version = "55.0.0", features = ["ipc", "csv", "json"] }
arrow-json = "55.0.0"
cityjson = { path = "../cityjson-rs"}
lazy_static = "1.5.0"
tempfile = "3.19.1"
nanoserde = { version = "0.2.1", features = ["json", "std"] }
memmap2 = "0.9.5"
bytes = "1.10.1"
parquet = "55.0.0"

[dev-dependencies]
rand = "0.9.0"
