[package]
name = "cityarrow"
version = "0.1.0"
edition = "2024"


[dependencies]
arrow = { version = "57.0.0", features = ["ipc", "csv", "json"] }
arrow-json = "57.0.0"
cityjson = { path = "../cityjson-rs" }
serde = { version = "1.0", features = ["derive"] }
lazy_static = "1.5.0"
tempfile = "3.23.0"
nanoserde = { version = "0.2.1", features = ["json", "std"] }
memmap2 = "0.9.9"
bytes = "1.10.1"
parquet = "57.0.0"

[dev-dependencies]
serde_json = "1.0"
serde_cityjson = { path = "../serde_cityjson" }
rand = "0.9.0"
