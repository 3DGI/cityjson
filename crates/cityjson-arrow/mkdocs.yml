site_name: cityjson-arrow
site_description: User-facing documentation for cityjson-arrow and cityjson-parquet
docs_dir: docs
site_dir: site
strict: true

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight

nav:
  - Home: index.md
  - Products:
      - cityjson-arrow: cityjson-arrow.md
      - cityjson-parquet: cityjson-parquet.md
  - Specifications:
      - Package schema: package-schema.md
      - Arrow IPC layout: cityjson-arrow-ipc-spec.md
      - Parquet layout: cityjson-parquet-spec.md
  - Design:
      - Transport design: design.md
      - ADR 1: adr/001-canonical-transport-boundary.md
      - ADR 2: adr/002-address-transport-performance-bottlenecks.md
      - ADR 3: adr/003-separate-live-arrow-ipc-from-persistent-package-io.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
