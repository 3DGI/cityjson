allow-branch = ["main"]
shared-version = true
consolidate-commits = true
publish = true
push = true
sign-commit = false
sign-tag = false
tag-name = "v{{version}}"
tag-message = "Release {{tag_name}}"
pre-release-commit-message = "chore: release {{version}}"

pre-release-replacements = [
    { file = "CHANGELOG.md",
      search = "## \\[Unreleased\\]",
      replace = "## [Unreleased]\n\n## [{{version}}] - {{date}}",
      exactly = 1 },
]
