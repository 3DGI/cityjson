name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  RUSTFLAGS: -Dwarnings

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: extractions/setup-just@v4
      - run: just lint

  test:
    name: Test (${{matrix.os}})
    runs-on: ${{matrix.os}}-latest
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu, macos, windows]
    timeout-minutes: 60
    env:
      CITYJSON_SHARED_CORPUS_ROOT: ${{ github.workspace }}/cityjson-corpus
    steps:
      - uses: actions/checkout@v6
      - uses: actions/checkout@v6
        with:
          repository: 3DGI/cityjson-corpus
          path: cityjson-corpus
          sparse-checkout: |
            artifacts
            catalog
            cases
            schemas
            scripts
          sparse-checkout-cone-mode: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Render corpus correctness index
        working-directory: cityjson-corpus
        run: python scripts/render_correctness_index.py
      - uses: dtolnay/rust-toolchain@stable
      - uses: extractions/setup-just@v4
      - run: just test

  build-msrv:
    name: Build (MSRV ${{matrix.rust}})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rust: [1.93.0]
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{matrix.rust}}
      - uses: extractions/setup-just@v4
      - run: just build

  doc:
    name: Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      RUSTDOCFLAGS: --cfg docsrs -Dwarnings
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
      - uses: extractions/setup-just@v4
      - run: just doc

  test-python:
    name: Python (${{matrix.crate}} / ${{matrix.os}} / ${{matrix.python}})
    runs-on: ${{matrix.os}}-latest
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu, macos, windows]
        python: ["3.11", "3.12", "3.13"]
        crate: [cityjson-lib, cityjson-index]
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93.0
      - uses: actions/setup-python@v5
        with:
          python-version: ${{matrix.python}}
      - run: python -m pip install --upgrade pip uv
      - name: Pre-build cityjson-lib wheel (needed when testing cityjson-index)
        if: matrix.crate == 'cityjson-index'
        working-directory: crates/cityjson-lib/ffi/python
        run: uv build --wheel
      - name: Build + tox smoke
        working-directory: crates/${{matrix.crate}}/ffi/python
        run: uv run tox run

  miri:
    name: Miri
    runs-on: ubuntu-latest
    env:
      MIRIFLAGS: -Zmiri-strict-provenance
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@miri
      - uses: extractions/setup-just@v4
      - run: just miri
