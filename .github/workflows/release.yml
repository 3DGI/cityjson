name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify tag is on main
        run: git merge-base --is-ancestor "$GITHUB_SHA" origin/main
      - name: Require CI success on tagged commit
        run: |
          conclusion=$(gh run list \
            --workflow=ci.yml \
            --commit="$GITHUB_SHA" \
            --limit 1 \
            --json conclusion \
            --jq '.[0].conclusion')
          echo "Latest ci.yml conclusion for $GITHUB_SHA: ${conclusion:-<none>}"
          if [[ "$conclusion" != "success" ]]; then
            echo "::error::ci.yml must have succeeded on $GITHUB_SHA before release" >&2
            exit 1
          fi

  wheels-lib:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-13, macos-14, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93.0
      - uses: pypa/cibuildwheel@v2.21
        with:
          package-dir: crates/cityjson-lib/ffi/python
        env:
          CIBW_BUILD: "cp311-*"
          CIBW_SKIP: "*-musllinux* *_i686 *_ppc64le *_s390x *_aarch64"
          CIBW_ARCHS_LINUX: "x86_64"
          CIBW_ARCHS_MACOS: "x86_64 arm64"
          CIBW_ARCHS_WINDOWS: "AMD64"
          CIBW_BEFORE_ALL_LINUX: "curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y -t stable && . $HOME/.cargo/env"
          CIBW_ENVIRONMENT_LINUX: 'PATH="$HOME/.cargo/bin:$PATH"'
          CIBW_TEST_COMMAND: 'python -c "import cityjson_lib"'
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-lib-${{ matrix.os }}
          path: wheelhouse/*.whl

  wheels-index:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-13, macos-14, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93.0
      - uses: pypa/cibuildwheel@v2.21
        with:
          package-dir: crates/cityjson-index/ffi/python
        env:
          CIBW_BUILD: "cp311-*"
          CIBW_SKIP: "*-musllinux* *_i686 *_ppc64le *_s390x *_aarch64"
          CIBW_ARCHS_LINUX: "x86_64"
          CIBW_ARCHS_MACOS: "x86_64 arm64"
          CIBW_ARCHS_WINDOWS: "AMD64"
          CIBW_BEFORE_ALL_LINUX: "curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y -t stable && . $HOME/.cargo/env"
          CIBW_ENVIRONMENT_LINUX: 'PATH="$HOME/.cargo/bin:$PATH"'
          CIBW_TEST_COMMAND: 'python -c "import cityjson_index"'
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-index-${{ matrix.os }}
          path: wheelhouse/*.whl

  publish-lib:
    needs: wheels-lib
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-lib-*
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist

  publish-index:
    needs: [publish-lib, wheels-index]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-index-*
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist

  github-release:
    needs: [publish-lib, publish-index]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes
