name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify tag is on main
        run: git merge-base --is-ancestor "$GITHUB_SHA" origin/main
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --workspace --locked

  python-lib:
    needs: verify
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        run: python -m pip install --upgrade pip uv
      - name: Build wheel
        working-directory: crates/cityjson-lib
        run: uv build ffi/python/ --wheel --out-dir ffi/python/dist
      - name: Smoke-test wheel install
        run: |
          python -m venv /tmp/cityjson-lib-wheel
          /tmp/cityjson-lib-wheel/bin/pip install --upgrade pip
          /tmp/cityjson-lib-wheel/bin/pip install crates/cityjson-lib/ffi/python/dist/*.whl
          /tmp/cityjson-lib-wheel/bin/python -c "import cityjson_lib"
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: crates/cityjson-lib/ffi/python/dist

  python-index:
    needs: python-lib
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        run: python -m pip install --upgrade pip uv
      - name: Build wheel
        working-directory: crates/cityjson-index
        run: uv build ffi/python/ --wheel --out-dir ffi/python/dist
      - name: Smoke-test wheel install
        run: |
          python -m venv /tmp/cityjson-index-wheel
          /tmp/cityjson-index-wheel/bin/pip install --upgrade pip
          /tmp/cityjson-index-wheel/bin/pip install crates/cityjson-index/ffi/python/dist/*.whl
          /tmp/cityjson-index-wheel/bin/python -c "import cityjson_index"
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: crates/cityjson-index/ffi/python/dist

  github-release:
    needs: [python-lib, python-index]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes
